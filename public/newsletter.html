<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The West Africa Brief — Le Vieillard</title>
<meta name="description" content="A weekly business & geopolitics brief on ECOWAS and the Sahel — currency, trade, security and FDI signals, curated from the ground.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;0,900;1,500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f6f4ef; --bg-card:#ffffff;
    --ink:#15130f; --ink-soft:#5a554c; --line:#e4e0d6;
    --brand:#b8121b; --gold:#c8920f; --green:#1b6b46;
    --serif:'Playfair Display',Georgia,serif;
    --sans:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --maxw:760px;
  }
  html[data-theme="dark"]{
    --bg:#16140f; --bg-soft:#1e1b15; --bg-card:#201d16;
    --ink:#f4f1e9; --ink-soft:#a9a294; --line:#332f26;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg-soft);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* ---- top bar ---- */
  .bar{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 22px}
  .bar a.home{font-family:var(--serif);font-weight:800;font-size:1.05rem}
  .bar a.home .accent{color:var(--brand)}
  .controls{display:flex;align-items:center;gap:10px}
  .lang-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--bg)}
  .lang-toggle button{border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-family:var(--sans);font-weight:700;font-size:.72rem;padding:6px 13px;transition:.15s}
  .lang-toggle button.active{background:var(--ink);color:var(--bg)}
  .pill-btn{border:1px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;font-family:var(--sans);font-size:.74rem;font-weight:600;padding:6px 12px;border-radius:999px;transition:.15s}
  .pill-btn:hover{border-color:var(--ink)}

  /* ---- the issue (paper) ---- */
  .issue{max-width:var(--maxw);margin:0 auto 60px;background:var(--bg);border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .masthead{text-align:center;padding:40px 40px 26px;border-bottom:3px double var(--ink)}
  .masthead .kicker{font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--brand);font-weight:700}
  .masthead h1{font-family:var(--serif);font-weight:900;font-size:clamp(2rem,5vw,3rem);line-height:1;margin:10px 0 8px;letter-spacing:-.02em}
  .masthead .tag{font-size:.82rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
  .masthead .date{margin-top:14px;font-size:.78rem;color:var(--ink-soft);font-style:italic;font-family:var(--serif)}

  .body{padding:30px 40px 44px}
  section{margin:0 0 36px}
  .sec-head{display:flex;align-items:center;gap:14px;margin:0 0 16px}
  .sec-head h2{font-family:var(--serif);font-weight:800;font-size:1.35rem;white-space:nowrap;letter-spacing:-.01em}
  .sec-head .bar-line{height:2px;background:var(--ink);flex:1;opacity:.14}
  .sec-num{font-size:.72rem;font-weight:700;color:var(--brand);letter-spacing:.1em}

  /* Macro overview */
  .macro li{list-style:none;padding:13px 0;border-bottom:1px solid var(--line);display:flex;gap:14px}
  .macro li:last-child{border-bottom:none}
  .macro .idx{font-family:var(--serif);font-weight:800;font-size:1.1rem;color:var(--gold);flex:none;width:24px;line-height:1.4}
  .macro a{font-weight:600;font-size:1.02rem;line-height:1.45}
  .macro a:hover{color:var(--brand)}
  .macro .src{display:block;font-size:.72rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

  /* Deep dive */
  .deep{background:var(--bg-soft);border-left:4px solid var(--brand);padding:22px 24px;border-radius:0 8px 8px 0}
  .deep .cat{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--brand)}
  .deep h3{font-family:var(--serif);font-weight:800;font-size:1.5rem;line-height:1.15;margin:8px 0 12px}
  .deep h3 a:hover{color:var(--brand)}
  .deep p.lede{font-size:1.02rem;color:var(--ink);margin-bottom:16px}
  .deep .why{border-top:1px dashed var(--line);padding-top:14px;font-size:.92rem}
  .deep .why b{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:4px}
  .deep .read{display:inline-block;margin-top:14px;font-size:.8rem;font-weight:700;color:var(--brand);letter-spacing:.02em}
  .deep .read:hover{opacity:.7}
  .deep .read::after{content:" →"}

  /* Briefs */
  .briefs{display:grid;grid-template-columns:1fr 1fr;gap:24px 30px}
  .brief h4{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);
    border-bottom:2px solid var(--line);padding-bottom:7px;margin-bottom:10px}
  .brief li{list-style:none;padding:8px 0;border-bottom:1px solid var(--line);font-size:.92rem;line-height:1.4}
  .brief li:last-child{border-bottom:none}
  .brief a{font-weight:500}
  .brief a:hover{color:var(--brand)}
  .brief .src{font-size:.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}

  .empty{color:var(--ink-soft);font-style:italic;padding:30px 0;text-align:center}
  .footer{border-top:3px double var(--ink);padding:22px 40px;text-align:center;font-size:.76rem;color:var(--ink-soft)}
  .footer a{color:var(--brand);font-weight:600}
  .skel{opacity:.5}

  @media (max-width:640px){
    .masthead,.body,.footer{padding-left:22px;padding-right:22px}
    .briefs{grid-template-columns:1fr}
  }
  @media print{
    body{background:#fff}
    .bar,.controls{display:none}
    .issue{border:none;box-shadow:none;margin:0;max-width:100%}
    .deep .read{display:none}
  }
</style>
</head>
<body>
  <div class="bar">
    <a class="home" href="/">Le <span class="accent">Vieillard</span></a>
    <div class="controls">
      <div class="lang-toggle" id="lang">
        <button data-l="fr" class="active">FR</button>
        <button data-l="en">EN</button>
      </div>
      <button class="pill-btn" id="print">⎙ <span id="printTxt">Imprimer</span></button>
      <button class="pill-btn" id="theme">◐</button>
    </div>
  </div>

  <article class="issue" id="issue">
    <div class="masthead">
      <div class="kicker" id="kicker">Le Vieillard · Intelligence</div>
      <h1 id="title">…</h1>
      <div class="tag" id="tag"></div>
      <div class="date" id="date"></div>
    </div>
    <div class="body" id="content">
      <p class="empty skel">…</p>
    </div>
    <div class="footer" id="footer"></div>
  </article>

<script>
  const $ = s => document.querySelector(s);
  let lang = localStorage.getItem('lv_lang') === 'en' ? 'en' : 'fr';

  /* theme (shared with the main app) */
  const savedTheme = localStorage.getItem('lv_theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  $('#theme').onclick = () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('lv_theme', next);
  };
  $('#print').onclick = () => window.print();

  const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function render(d){
    document.documentElement.lang = d.lang;
    $('#title').textContent = d.title;
    $('#tag').textContent = d.tagline;
    $('#date').textContent = d.date;
    $('#printTxt').textContent = d.lang === 'en' ? 'Print' : 'Imprimer';
    const L = d.labels;
    let html = '';

    /* 1 — Macro overview */
    if (d.macro && d.macro.length){
      html += `<section><div class="sec-head"><span class="sec-num">01</span><h2>${esc(L.macro)}</h2><span class="bar-line"></span></div><ul class="macro">`;
      d.macro.forEach((m,i) => {
        html += `<li><span class="idx">${i+1}</span><div><a href="/#a${m.id}">${esc(m.title)}</a><span class="src">${esc(m.source)}</span></div></li>`;
      });
      html += `</ul></section>`;
    }

    /* 2 — Deep dive */
    if (d.deep){
      html += `<section><div class="sec-head"><span class="sec-num">02</span><h2>${esc(L.deep)}</h2><span class="bar-line"></span></div>
        <div class="deep">
          <span class="cat">${esc(d.deep.cat)}</span>
          <h3><a href="/#a${d.deep.id}">${esc(d.deep.title)}</a></h3>
          <p class="lede">${esc(d.deep.excerpt)}</p>
          <div class="why"><b>${esc(L.why)}</b>${esc(d.deep.why)}</div>
          <a class="read" href="${esc(d.deep.url)}" target="_blank" rel="noopener">${esc(L.read)}</a>
        </div></section>`;
    }

    /* 3 — Regional briefs */
    if (d.briefs && d.briefs.length){
      html += `<section><div class="sec-head"><span class="sec-num">03</span><h2>${esc(L.briefs)}</h2><span class="bar-line"></span></div><div class="briefs">`;
      d.briefs.forEach(b => {
        html += `<div class="brief"><h4>${esc(b.label)}</h4><ul>`;
        b.items.forEach(it => {
          html += `<li><a href="/#a${it.id}">${esc(it.title)}</a> <span class="src">— ${esc(it.source)}</span></li>`;
        });
        html += `</ul></div>`;
      });
      html += `</div></section>`;
    }

    if (!html) html = `<p class="empty">${esc(L.empty)}</p>`;
    $('#content').innerHTML = html;

    const sourced = d.lang === 'en'
      ? `Curated from ${d.storyCount} stories across regional wires. <a href="/subscribe">Get the Brief on Telegram →</a>`
      : `Compilé à partir de ${d.storyCount} actualités de la presse régionale. <a href="/subscribe">Recevoir Le Point sur Telegram →</a>`;
    $('#footer').innerHTML = sourced;
  }

  async function load(){
    try{
      const r = await fetch('/api/newsletter?lang=' + lang, { cache: 'no-store' });
      render(await r.json());
    }catch(e){
      $('#content').innerHTML = '<p class="empty">⚠︎ ' +
        (lang === 'en' ? 'Could not load the brief.' : 'Impossible de charger le point.') + '</p>';
    }
  }

  document.querySelectorAll('#lang button').forEach(b => {
    if (b.dataset.l === lang) b.classList.add('active'); else b.classList.remove('active');
    b.onclick = () => {
      lang = b.dataset.l; localStorage.setItem('lv_lang', lang);
      document.querySelectorAll('#lang button').forEach(x => x.classList.toggle('active', x === b));
      load();
    };
  });

  load();
</script>
</body>
</html>
